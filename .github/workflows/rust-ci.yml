name: Rust CI

on:
  push:
    paths:
      - "rust/**"
      - "tests/fixtures/**"
      - ".github/workflows/rust-ci.yml"
  pull_request:
    paths:
      - "rust/**"
      - "tests/fixtures/**"
      - ".github/workflows/rust-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test
